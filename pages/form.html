<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickleTrack - Log Match</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../index.html"><i class="bi bi-trophy-fill text-warning me-2"></i>PickleTrack</a>
            <div class="navbar-nav">
                <a class="nav-link" href="../index.html">Home</a>
                <a class="nav-link active" href="form.html">Log Match</a>
                <a class="nav-link" href="admin.html">Admin Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container my-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0 p-4">
            <h2 class="mb-4 text-center fw-bold"><i class="bi bi-plus-circle me-2"></i>Log New Match</h2>
            <form id="matchLogForm">
                <div class="mb-3">
                    <label for="matchDate" class="form-label fw-semibold">Match Date</label>
                    <input type="date" class="form-control" id="matchDate" required>
                </div>
                <div class="mb-3">
                    <label for="opponentName" class="form-label fw-semibold">Opponent Name</label>
                    <input type="text" class="form-control" id="opponentName" placeholder="e.g., UNA Club Team" required>
                </div>
                <div class="row mb-3">
                    <div class="col-6">
                        <label for="yourScore" class="form-label fw-semibold">Your Score</label>
                        <input type="number" class="form-control" id="yourScore" min="0" required>
                    </div>
                    <div class="col-6">
                        <label for="opponentScore" class="form-label fw-semibold">Opponent Score</label>
                        <input type="number" class="form-control" id="opponentScore" min="0" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="categoryTag" class="form-label fw-semibold">Category</label>
                    <select class="form-select" id="categoryTag">
                        <option value="Collegiate">Collegiate</option>
                        <option value="Practice">Practice</option>
                        <option value="Tournament">Tournament</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label for="matchNotes" class="form-label fw-semibold">Notes</label>
                    <textarea class="form-control" id="matchNotes" rows="3" placeholder="Key takeaways or observations..."></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2"><i class="bi bi-cloud-arrow-up me-1"></i> Submit Match & Save Data</button>
            </form>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-dark text-white text-center">
        <div class="container">
            <p class="mb-1">PickleTrack App &copy; 2026 | Addison Flint</p>
            <small>
                <a href="https://github.com/addisonflint" class="text-white text-decoration-none me-2" target="_blank">Profile</a> | 
                <a href="https://github.com/addisonflint/charlie-pickle-track" class="text-white text-decoration-none ms-2" target="_blank">Repository</a>
            </small>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
