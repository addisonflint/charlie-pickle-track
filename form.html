<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PickleTrack - Log Match</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>PickleTrack App</h1>
            <p>
                <a href="index.html">Home</a> | 
                <a href="form.html">Log Match</a> | 
                <a href="admin.html">Admin Dashboard</a>
            </p>
        </header>
        <hr>

        <main>
            <h2>Log a Match</h2>
            <form id="matchLogForm" style="max-width: 400px;">
                <div class="mb-3">
                    <label class="form-label">Match Date:</label>
                    <input type="date" class="form-control" id="matchDate" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Opponent Name:</label>
                    <input type="text" class="form-control" id="opponentName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Your Score:</label>
                    <input type="number" class="form-control" id="yourScore" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Opponent Score:</label>
                    <input type="number" class="form-control" id="opponentScore" required>
                </div>
                <button type="submit" class="btn btn-success">Submit Match Data</button>
            </form>
        </main>
    </div>

    <hr>
    <footer class="container">
        <p>
            <a href="https://github.com/addisonflint" target="_blank">My GitHub Profile</a> | 
            <a href="https://github.com/addisonflint/Dev-Project-Addison" target="_blank">View Source Code Repo</a>
        </p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
