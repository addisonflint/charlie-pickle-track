<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickleTrack - Match & Stat Vault</title>
    
    <!-- Libraries & Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-trophy-fill text-warning me-2"></i>PickleTrack
            </a>
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Home</a>
                <a class="nav-link" href="pages/form.html">Log Match</a>
                <a class="nav-link" href="pages/admin.html">Admin Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Auth Header / Greeting -->
        <div class="row align-items-center mb-4">
            <div class="col-md-7">
                <h1 class="display-6 fw-bold">Collegiate Pickleball Match Log</h1>
                <p class="text-muted">Track match metrics, score differentials, and game history.</p>
            </div>
            <div class="col-md-5">
                <div class="card shadow-sm p-3 bg-white border-0">
                    <div id="authStatusContainer">
                        <form id="signInForm">
                            <div class="mb-2">
                                <label for="usernameInput" class="form-label small fw-bold">Username</label>
                                <input type="text" class="form-control form-control-sm" id="usernameInput" placeholder="Enter username" required>
                            </div>
                            <div class="mb-2">
                                <label for="passwordInput" class="form-label small fw-bold">Password</label>
                                <input type="password" class="form-control form-control-sm" id="passwordInput" placeholder="cat" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100"><i class="bi bi-shield-lock me-1"></i> Sign In</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls: Search, Filter, Sort -->
        <div class="row g-3 mb-4">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search matches by opponent, notes, or date...">
                </div>
            </div>
            <div class="col-md-4">
                <select id="filterTag" class="form-select">
                    <option value="ALL">All Categories</option>
                    <option value="Collegiate">Collegiate</option>
                    <option value="Practice">Practice</option>
                    <option value="Tournament">Tournament</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="sortBy" class="form-select">
                    <option value="newest">Sort: Date (Newest First)</option>
                    <option value="oldest">Sort: Date (Oldest First)</option>
                    <option value="title">Sort: Opponent (A-Z)</option>
                </select>
            </div>
        </div>

        <!-- Dynamic Card Container -->
        <div class="row" id="matchContainer">
            <!-- Dynamic Content Cards Injected Here via app.js -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-dark text-white text-center">
        <div class="container">
            <p class="mb-1">PickleTrack App &copy; 2026 | Addison Flint</p>
            <small>
                <a href="https://github.com/addisonflint" class="text-white text-decoration-none me-2" target="_blank"><i class="bi bi-github"></i> Profile</a> | 
                <a href="https://github.com/addisonflint/charlie-pickle-track" class="text-white text-decoration-none ms-2" target="_blank"><i class="bi bi-code-slash"></i> Source Code</a>
            </small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
