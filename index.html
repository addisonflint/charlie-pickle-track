        <main>
            <h2>Welcome to PickleTrack</h2>
            <p>This app helps collegiate pickleball players log their matches and track statistics.</p>
            
            <br>

            <h3>Player Sign In</h3>
            <form id="signInForm" style="max-width: 300px;">
                <div class="mb-3">
                    <label class="form-label">Username:</label>
                    <input type="text" class="form-control" id="usernameInput" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password:</label>
                    <input type="password" class="form-control" id="passwordInput" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
        </main>

    </div>
